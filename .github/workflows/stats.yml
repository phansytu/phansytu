name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: '0 */6 * * *' # Cứ 6 tiếng tự cập nhật 1 lần
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: phansytu
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Ho_Chi_Minh
          filename: github-stats.svg # Tên file ảnh sẽ sinh ra
