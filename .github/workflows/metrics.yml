name: Personal GitHub Metrics

on:
  schedule:
    - cron: '0 */6 * * *' # Tự động chạy lại cứ sau 6 tiếng
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: phansytu
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Ho_Chi_Minh
          filename: github-metrics.svg # Tên file ảnh sẽ sinh ra trong repo
