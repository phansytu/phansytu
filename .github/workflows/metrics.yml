name: Personal GitHub Metrics
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{secrets.METRICS_TOKEN}}
          user: phansytu
          template: classic
          config_timezone: Asia/Ho_Chi_Minh
          filename: github-metrics.svg

          config_twemoji: yes

          # Ẩn bớt các mục cơ bản dài dòng (repo list...)
          base: header, activity, community

          # Đổi màu bằng CSS tuỳ chỉnh
          extras_css: |
            :root {
              --color-title: #4285f4;
              --color-text: #1a73e8;
              --color-icons: #4285f4;
            }

          # Rank / huy chương
          plugin_achievements: yes
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: B
          plugin_achievements_limit: 3

          # Ngôn ngữ
          plugin_languages: yes
          plugin_languages_limit: 4
          plugin_languages_details: percentage
