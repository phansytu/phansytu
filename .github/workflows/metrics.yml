name: Personal GitHub Metrics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN}}
          user: phansytu
          template: classic
          config_timezone: Asia/Ho_Chi_Minh
          filename: github-metrics.svg
          
          # 1. ĐỔI MÀU CHỮ SANG XANH DƯƠNG (Sử dụng palette màu tùy biến)
          config_twemoji: yes
          # Mã màu hex cho phần text và các chi tiết chính chuyển sang màu xanh dương
          palette: custom
          color_primary: "#4285f4"   # Màu xanh dương làm chủ đạo
          color_text: "#1a73e8"      # Màu chữ xanh dương sáng
          
          # 2. RÚT GỌN CHỈ HIỂN THỊ CÁC THÔNG SỐ CHÍNH
          base: header, activity, community
          base_repositories: no      # Tắt danh sách repo chi tiết dài dòng
          
          # 3. HIỂN THỊ RANK / HUY CHƯƠNG GỌN GÀNG (Chỉ hiện các thành tựu cao nhất)
          plugin_achievements: yes
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: B  # Chỉ hiển thị từ rank B trở lên để tránh dài dòng
          plugin_achievements_limit: 3       # Giới hạn chỉ hiện tối đa 3 huy chương chính
          
          # 4. THÊM TÓM TẮT NGÔN NGỮ (Tùy chọn cho đủ 6-7 ý chính rất đẹp)
          plugin_languages: yes
          plugin_languages_limit: 4          # Chỉ hiển thị top 4 ngôn ngữ bạn code nhiều nhất
          plugin_languages_details: percentage # Chỉ hiện phần trăm, ẩn các chi tiết dài dòng
